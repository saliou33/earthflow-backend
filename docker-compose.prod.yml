networks:
  earthflow-network:
    name: earthflow-network
    driver: bridge

services:
  db:
    image: postgis/postgis:16-3.4
    networks:
      - earthflow-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-earthflow}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --address ":9000" --console-address ":9001"
    networks:
      - earthflow-network
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
      MINIO_SERVER_URL: https://${MINIO_API_DOMAIN:-s3.localhost}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`${MINIO_API_DOMAIN:-s3.localhost}`)"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"

  backend:
    image: ghcr.io/saliou33/earthflow-backend:latest
    networks:
      - earthflow-network
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/earthflow
      - MINIO_ENDPOINT=https://${MINIO_API_DOMAIN:-s3.localhost}
      - TITILER_ENDPOINT=https://${TITILER_DOMAIN:-tiles.localhost}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-admin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-password}
      - RUST_ENV=production
      - RUST_LOG=info
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${BACKEND_DOMAIN:-api.localhost}`)"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    networks:
      - earthflow-network
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-password}
      - AWS_REGION=us-east-1
      - AWS_S3_ENDPOINT=http://minio:9000
      - AWS_S3_FORCE_PATH_STYLE=true
      - AWS_VIRTUAL_HOSTING=FALSE
      - AWS_HTTPS=NO
      - TITILER_STACK_NAME=earthflow
      - TITILER_CORS_ORIGINS=["*"]
    depends_on:
      minio:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.titiler.rule=Host(`${TITILER_DOMAIN:-tiles.localhost}`)"
      - "traefik.http.services.titiler.loadbalancer.server.port=80"

volumes:
  db_data:
  minio_data:
