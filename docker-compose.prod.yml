networks:
  earthflow-network:
    name: earthflow-network
    driver: bridge

services:
  db:
    image: postgis/postgis:16-3.4
    networks:
      - earthflow-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-earthflow}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    networks:
      - earthflow-network
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    image: ghcr.io/saliou33/earthflow-backend:latest
    networks:
      - earthflow-network
    ports:
      - "8081:8080"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-earthflow}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-admin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-password}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    networks:
      - earthflow-network
    ports:
      - "8001:80"
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-password}
      - AWS_REGION=us-east-1
      - AWS_S3_ENDPOINT=http://minio:9000
      - AWS_S3_FORCE_PATH_STYLE=true
      - AWS_VIRTUAL_HOSTING=FALSE
      - AWS_HTTPS=NO
      - TITILER_STACK_NAME=earthflow
      - TITILER_CORS_ORIGINS=["*"]
    depends_on:
      minio:
        condition: service_started

volumes:
  db_data:
  minio_data:
