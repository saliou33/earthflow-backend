services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-earthflow}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --address ":9000" --console-address ":9001"
    networks:
      - earthflow-network
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-password}
      - MINIO_API_CORS_ALLOW_ORIGIN=*
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`${MINIO_API_DOMAIN:-s3.senpost.cc}`)"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"

  backend:
    image: ghcr.io/saliou33/earthflow-backend:latest
    ports:
      - "8081:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/earthflow
      - MINIO_ENDPOINT=https://${MINIO_API_DOMAIN:-s3.senpost.cc}
      - TITILER_ENDPOINT=https://${TITILER_DOMAIN:-tile.senpost.cc}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-admin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-password}
      - RUST_ENV=production
    depends_on:
      - db
      - minio
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${BACKEND_DOMAIN:-api.senpost.cc}`)"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    ports:
      - "8001:80"
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-password}
      - AWS_REGION=us-east-1
      - AWS_S3_ENDPOINT=http://minio:9000
      - AWS_S3_FORCE_PATH_STYLE=true
      - AWS_VIRTUAL_HOSTING=FALSE
      - AWS_HTTPS=NO
    depends_on:
      - minio
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.titiler.rule=Host(`${TITILER_DOMAIN:-tile.senpost.cc}`)"
      - "traefik.http.services.titiler.loadbalancer.server.port=80"

volumes:
  db_data:
  minio_data:

networks:
  earthflow-network:
    external: true
